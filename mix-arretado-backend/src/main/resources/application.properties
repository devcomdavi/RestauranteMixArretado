spring.application.name=mix-arretado-backend

# Importar arquivo de segredos (que não irá para o GitHub)
spring.config.import=optional:file:.env.properties

# PostgreSQL Database Configuration (Supabase)
spring.datasource.url=jdbc:postgresql://db.norkuqtxwhelibidfkob.supabase.co:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=${SUPABASE_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=never

# Security JWT Configuration
supabase.jwt.secret=${SUPABASE_JWT_SECRET}
