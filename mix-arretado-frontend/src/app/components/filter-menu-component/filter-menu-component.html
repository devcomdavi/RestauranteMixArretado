<div class="flex flex-wrap justify-center gap-4 py-8">
    <button 
      (click)="selectCategory('Todos')"
      [class.bg-nordeste-orange]="activeCategory() === 'Todos'"
      [class.text-white]="activeCategory() === 'Todos'"
      [class.bg-white]="activeCategory() !== 'Todos'"
      [class.text-nordeste-brown]="activeCategory() !== 'Todos'"
      class="px-6 py-2 rounded-full font-bold border-2 border-nordeste-orange transition-all hover:scale-105 shadow-sm font-titillium">
      Todos
    </button>

    @for (category of categories(); track category) {
      <button 
        (click)="selectCategory(category)"
        [class.bg-nordeste-orange]="activeCategory() === category"
        [class.text-white]="activeCategory() === category"
        [class.bg-white]="activeCategory() !== category"
        [class.text-nordeste-brown]="activeCategory() !== category"
        class="px-6 py-2 rounded-full font-bold border-2 border-nordeste-orange transition-all hover:scale-105 shadow-sm font-titillium">
        {{ category }}
      </button>
    }

    @if (authService.session) {
      <button 
        (click)="toggleAddForm()"
        class="flex items-center justify-center px-6 h-11 rounded-full font-bold border-2 border-nordeste-orange bg-nordeste-orange text-white transition-all hover:bg-white hover:text-nordeste-orange hover:scale-105 shadow-sm pb-1 font-titillium gap-2" title="Adicionar novo prato">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"></path><path d="M12 5v14"></path></svg>
        Novo Prato
      </button>
    }
  </div>
