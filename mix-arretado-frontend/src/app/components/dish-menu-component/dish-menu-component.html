<div class="bg-white rounded-3xl overflow-hidden shadow-sm hover:shadow-xl transition-all group border border-orange-50 h-full flex flex-col relative">
    
    <!-- Modal de Exclusão (Overlay dentro do próprio card) -->
    @if (openEditId() === dish().id) {
      <div class="absolute inset-0 bg-black/80 backdrop-blur-sm z-50 flex flex-col items-center justify-center p-6 text-center animate-in fade-in zoom-in duration-200">
          <h4 class="text-white text-xl font-bold font-xilosa mb-4">Deseja excluir este prato?</h4>
          <div class="flex gap-4">
              <button (click)="cancelEdit($event)" class="px-6 py-2 bg-transparent border-2 border-nordeste-orange text-nordeste-orange font-bold rounded-lg hover:bg-nordeste-orange hover:text-white transition-colors cursor-pointer">Cancelar</button>
              <button (click)="confirmDelete($event)" class="px-6 py-2 bg-red-600 text-white font-bold rounded-lg hover:bg-red-700 transition-colors shadow-md cursor-pointer">Excluir</button>
          </div>
      </div>
    }

    <div class="relative h-56 overflow-hidden">
      <img [src]="dish().picture !== '/imagens/template_prato.png' ? dish().picture : 'images/template_prato.png'" 
           [alt]="dish().title" 
           class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500">
      
      <!-- Category Badge -->
      <div class="absolute top-4 left-4 bg-nordeste-orange/90 backdrop-blur text-white px-3 py-1 rounded-full text-xs font-bold uppercase tracking-wider">
        {{ dish().category || 'Geral' }}
      </div>

      <!-- Action Buttons (Only for authenticated users) -->
      @if (authService.session) {
        <div class="absolute top-4 right-4 flex gap-2">
          <button (click)="editDishDetails($event)" class="bg-white/90 hover:bg-white text-nordeste-brown p-2 rounded-full shadow-lg transition-transform hover:scale-110" title="Editar Prato">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"></path></svg>
          </button>
          <button (click)="deleteDishPrompt($event)" class="bg-red-500/90 hover:bg-red-500 text-white p-2 rounded-full shadow-lg transition-transform hover:scale-110" title="Excluir Prato">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"></path><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path></svg>
          </button>
        </div>
      }
  
      <!-- Price Badge -->
      <div class="absolute bottom-4 right-4 bg-white/95 backdrop-blur px-4 py-2 rounded-2xl text-lg font-bold text-nordeste-brown shadow-lg font-xilosa">
        {{ formatPrice(dish().price) }}
      </div>
    </div>
  
    <div class="p-6 flex-grow flex flex-col">
      <h3 class="text-2xl font-bold mb-3 text-nordeste-brown group-hover:text-nordeste-orange transition-colors font-xilosa leading-tight">
        {{ dish().title }}
      </h3>
      <p class="text-nordeste-brown/80 leading-relaxed text-sm line-clamp-3">
        {{ dish().description }}
      </p>
    </div>
  </div>
