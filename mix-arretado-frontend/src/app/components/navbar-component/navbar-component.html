<header class="relative bg-[#3E2723] text-[#FFF8E1] shadow-lg py-3">
      <div class="container mx-auto px-6 flex justify-between items-center">
        <a href="#"><img src="logo-mix-v-02.png" alt="logo-mix" class="h-20 md: h-24 w-auto transition-all duration-300" ></a>
        <nav class="hidden md:flex gap-8 font-medium font-titillium">
          <a href="#sobre" class="hover:text-[#FFB300] transition-colors">Nossa Raiz</a>
          <a href="#cardapio" class="hover:text-[#FFB300] transition-colors">Destaques</a>
          <a href="#cardapio" class="hover:text-[#FFB300] transition-colors">Cardápio</a>
          <a href="#depoimentos" class="hover:text-[#FFB300] transition-colors">O que dizem</a>
          <a href="#contato" class="hover:text-[#FFB300] transition-colors">Contato</a>
        </nav>
        <button class="invisible md:visible bg-[#E65100] text-white hover:bg-[#F57C00] block px-6 py-2 rounded-full font-bold transition-transform hover:scale-105 font-titillium">
          Fazer Reserva
        </button>
        <button (click)="toggleMenu()" class="px-6 py-2 cursor-pointer md:hidden">
          <span class="grayscale">{{ openMenu() ? '✕' : '☰'}}</span>
        </button>
      </div>
      <div class="flex flex-col px-6 py-4 gap-4 bg-[#3E2723] absolute left-0 right-0 top-full transition-all duration-300 ease-in-out md:hidden"
      [class.opacity-0]="!openMenu()"
      [class.pointer-events-none]="!openMenu()"
      [class.-translate-y-4]="!openMenu()"
      [class.opacity-100]="openMenu()"
      [class.translate-y-0]="openMenu()"
      [class.pointer-events-auto]="openMenu()">
        <nav class="flex flex-col gap-8 font-medium text-center font-titillium md:hidden">
          <a href="#sobre" class="hover:text-[#FFB300] transition-colors">Nossa Raiz</a>
          <a href="#cardapio" class="hover:text-[#FFB300] transition-colors">Destaques</a>
          <a href="#cardapio" class="hover:text-[#FFB300] transition-colors">Cardápio</a>
          <a href="#depoimentos" class="hover:text-[#FFB300] transition-colors">O que dizem</a>
          <a href="#contato" class="hover:text-[#FFB300] transition-colors">Contato</a>
        </nav>
        <button class="bg-[#E65100] text-white hover:bg-[#F57C00] md:block px-6 py-2 rounded-full font-bold transition-transform hover:scale-105 font-titillium">
          Fazer Reserva
        </button>
      </div>
</header>
