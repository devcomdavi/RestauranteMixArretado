<div (click)="toggleAddForm()" class="fixed inset-0 z-[60] flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm"
      [class.opacity-0]="!openAddForm()"
      [class.pointer-events-none]="!openAddForm()"
      [class.-translate-y-4]="!openAddForm()">
    <div (click)="$event.stopPropagation()" class="bg-[#FFF8E1] w-full max-w-md rounded-2xl shadow-2xl overflow-hidden relative animate-in fade-in zoom-in duration-200 font-titillium">
        <button (click)="toggleAddForm()" class="absolute top-4 right-4 text-[#3E2723] hover:text-[#E65100]">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-x" aria-hidden="true">
                <path d="M18 6 6 18"></path>
                <path d="m6 6 12 12"></path>
            </svg>
        </button>
        <div class="bg-[#3E2723] p-6 text-center">
            <h3 class="text-2xl font-bold text-[#FFB300] font-xilosa">
                {{ addFormState.editingDish() ? 'Editar Prato' : 'Adicionar Prato Novo' }}
            </h3>
        </div>
        <form [formGroup]="dishForm" (ngSubmit)="triggerAddButton()" class="p-6 space-y-4">
            <div>
                <label class="block text-sm font-bold text-[#3E2723] mb-1">Nome do Prato</label>
                <input formControlName="dishName" class="w-full px-4 py-2 rounded-lg border border-[#D7CCC8] bg-white text-[#3E2723] focus:outline-none focus:ring-2 focus:ring-[#E65100]" placeholder="Nome do Prato" type="text">
            </div>
            <div>
                <label class="block text-sm font-bold text-[#3E2723] mb-1">Descrição</label>
                <input formControlName="dishDescription" class="w-full px-4 py-2 rounded-lg border border-[#D7CCC8] bg-white text-[#3E2723] focus:outline-none focus:ring-2 focus:ring-[#E65100]" placeholder="Descrição do Prato" type="text">
            </div>
            <div>
                <label class="block text-sm font-bold text-[#3E2723] mb-1">Preço</label>
                <input inputmode="decimal" formControlName="dishPrice" class="w-full px-4 py-2 rounded-lg border border-[#D7CCC8] bg-white text-[#3E2723] focus:outline-none focus:ring-2 focus:ring-[#E65100]" placeholder="Preço do Prato" type="text">
            </div>
            <div>
                <label class="block text-sm font-bold text-[#3E2723] mb-1">Categoria</label>
                <select formControlName="selectedCategory" class="w-full px-4 py-2 rounded-lg border border-[#D7CCC8] bg-white text-[#3E2723] focus:outline-none focus:ring-2 focus:ring-[#E65100]">
                    <option value="tapioca-arretada">tapioca-arretada</option>
                    <option value="jantar">jantar</option>
                    <option value="cuscuz">cuscuz</option>
                    <option value="tapioquinha">tapioquinha</option>
                    <option value="sanduiches">sanduiches</option>
                    <option value="sanduiches-especiais">sanduiches-especiais</option>
                    <option value="pasteis-salgados">pasteis-salgados</option>
                    <option value="pasteis-doces">pasteis-doces</option>
                    <option value="sobremesas">sobremesas</option>
                    <option value="adicionais">adicionais</option>
                    <option value="sucos">sucos</option>
                    <option value="bebidas">bebidas</option>
                </select>
            </div>
            <div>
                <label for="file" class="block text-sm font-bold text-[#3E2723] mb-1">Foto do Prato</label>
                <input formControlName="dishPicture" class="w-full px-4 py-2 rounded-lg border border-[#D7CCC8] bg-white text-[#3E2723] focus:outline-none focus:ring-2 focus:ring-[#E65100]" type="file" id="file" accept=".png,.jpg,.jpeg,.svg">
            </div>
            <div class="flex gap-3 mt-4">
                <button (click)="toggleAddForm()" type="button" class="w-1/3 py-3 bg-transparent border-2 border-[#E65100] text-[#E65100] font-bold rounded-lg hover:bg-[#E65100] hover:text-white transition-colors">Cancelar</button>
                <button type="submit" class="w-2/3 py-3 bg-[#E65100] text-white font-bold rounded-lg hover:bg-[#D84315] transition-colors shadow-md">
                    {{ addFormState.editingDish() ? 'Salvar Alterações' : 'Adicionar' }}
                </button>
            </div>
        </form>
    </div>
</div>
